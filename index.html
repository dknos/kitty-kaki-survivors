<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Kitty Kaki Survivors</title>
  <meta name="description" content="A Vampire-Survivors-style horde game. Survive the night.">
  <meta name="color-scheme" content="dark">

  <!-- Open Graph / Twitter — social preview cards -->
  <meta property="og:title" content="Kitty Kaki Survivors">
  <meta property="og:description" content="A Vampire-Survivors-style horde game. Survive the night.">
  <!-- og:image + twitter:image suppressed until a real screenshot lands. Pointing
       at a missing file makes social previews show a broken/empty card. Better to
       fall back to the platform default. v1.1 TODO: capture assets/og-card.png. -->
  <meta property="og:url" content="https://dknos.github.io/kitty-kaki-survivors/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Kitty Kaki Survivors">
  <meta name="twitter:description" content="A Vampire-Survivors-style horde game. Survive the night.">

  <style>
    /* Iter 10a — font-scale CSS var consumed by .kk-fs-* buckets in ui.js */
    :root { --kk-font-scale: 1; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #fff; }
    #game-canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
    #ui-root { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    #ui-root > * { pointer-events: auto; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui-root"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
